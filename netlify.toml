[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "18"

# 函数配置
[functions]
  node_bundler = "esbuild"

[[functions."___netlify-server-handler"]]
  timeout = 60

# 重定向规则
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
